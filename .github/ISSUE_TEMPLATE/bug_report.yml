name: Bug Report
description: File a bug report to help us improve py-agent-core
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g., The agent loop hangs when executing dynamic tools...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior, preferably with a minimal Python code sample.
      placeholder: |
        1. Initialize PyAgent with...
        2. Run run_loop()...
        3. See error traceback:
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected vs Actual Behavior
      description: Describe what you expected to happen, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Python version, library version, OS, and LLM backend adapter being used.
      placeholder: |
        - OS: Linux
        - Python: 3.10
        - py-agent-core: 0.1.0
        - Backend: Ollama (llama3)
    validations:
      required: true
