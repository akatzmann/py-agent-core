name: Feature Request
description: Propose a new feature, enhancement, or example for py-agent-core
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the form below to propose changes or new capabilities.
  - type: textarea
    id: feature_description
    attributes:
      label: Feature Description
      description: A clear and concise description of what the feature or enhancement is.
      placeholder: e.g., Add support for Anthropic Claude backend...
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Use Case & Motivation
      description: Why is this feature needed? What problem does it solve, and how will it benefit developers?
      placeholder: e.g., Developers using Claude models need an adapter to...
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: A detailed description of your proposed approach or design.
      placeholder: e.g., Create AnthropicBackend in py_agent_core/backends/...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you considered.
